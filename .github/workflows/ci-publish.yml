name: CI and Publish

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          # Revalidate the Koffi sync-callback fix from koffi@^2.15.6 on Node 24.
          node-version: 24
          # Keep setup-node v5 from enabling package-manager cache implicitly.
          package-manager-cache: false

      - name: Install TypeScript CLI
        run: npm install --global typescript@5

      - name: Prefetch crate dependencies
        run: |
          cargo fetch --locked
          cargo fetch --manifest-path fixtures/basic-fixture/Cargo.toml
          cargo fetch --manifest-path fixtures/callback-fixture/Cargo.toml

      - name: Run default test suite
        run: cargo test --locked

      - name: Run ignored runtime and benchmark tests
        run: cargo test --locked -- --ignored

  generated-package-smoke:
    name: Generated Package Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          # Revalidate the Koffi sync-callback fix from koffi@^2.15.6 on Node 24.
          node-version: 24
          # Keep setup-node v5 from enabling package-manager cache implicitly.
          package-manager-cache: false

      - name: Prefetch crate dependencies
        run: |
          cargo fetch --locked
          cargo fetch --manifest-path fixtures/basic-fixture/Cargo.toml
          cargo fetch --manifest-path fixtures/callback-fixture/Cargo.toml

      - name: Run generated-package smoke coverage
        run: |
          cargo test --locked --test node_smoke_tests runs_plain_js_smoke_script_against_generated_basic_fixture_package -- --exact
          cargo test --locked --test node_smoke_tests runs_plain_js_smoke_script_against_generated_callback_fixture_package -- --exact
          cargo test --locked --test node_smoke_tests runs_plain_js_smoke_script_against_generated_bundled_basic_fixture_package -- --exact
          cargo test --locked --test node_smoke_tests manual_load_explicit_path_overrides_missing_bundled_prebuild_and_is_idempotent -- --exact
          cargo test --locked --test node_smoke_tests bundled_mode_import_reports_missing_host_prebuild -- --exact

  release:
    name: Release
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
      - generated-package-smoke
    if: "${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && !startsWith(github.event.head_commit.message, 'chore(release): prepare v') }}"
    concurrency:
      group: release-main
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Prepare release
        id: prepare
        env:
          EVENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          bump_patch() {
            local version="$1"
            local major minor patch extra

            IFS=. read -r major minor patch extra <<< "$version"

            if [ "${major:-}" != "0" ] || [ "${minor:-}" != "0" ] || [ -n "${extra:-}" ] || [ -z "${patch:-}" ]; then
              echo "release automation only supports 0.0.X versions; found ${version}" >&2
              return 1
            fi

            printf '0.0.%s\n' "$((patch + 1))"
          }

          version_http_status() {
            local version="$1"

            curl -sS -o /dev/null -w '%{http_code}' \
              "https://crates.io/api/v1/crates/${crate_name}/${version}"
          }

          version_is_published() {
            local version="$1"
            local status

            status="$(version_http_status "$version")"
            case "$status" in
              200) return 0 ;;
              404) return 1 ;;
              *)
                echo "unexpected crates.io status for ${crate_name} ${version}: ${status}" >&2
                return 2
                ;;
            esac
          }

          git fetch origin refs/heads/main:refs/remotes/origin/main --tags
          tip_sha="$(git rev-parse origin/main)"
          if [ "$EVENT_SHA" != "$tip_sha" ]; then
            echo "release_ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping release because ${EVENT_SHA} is no longer the tip of main (${tip_sha})."
            exit 0
          fi

          git checkout -B main "$EVENT_SHA"

          manifest_json="$(cargo read-manifest)"
          crate_name="$(printf '%s' "$manifest_json" | python3 -c 'import json, sys; print(json.load(sys.stdin)["name"])')"
          current_version="$(printf '%s' "$manifest_json" | python3 -c 'import json, sys; print(json.load(sys.stdin)["version"])')"

          next_version="$(bump_patch "$current_version")"

          git fetch origin refs/heads/main:refs/remotes/origin/main --tags
          head_sha="$(git rev-parse HEAD)"
          tip_sha="$(git rev-parse origin/main)"
          if [ "$head_sha" != "$tip_sha" ]; then
            echo "release_ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping release because ${head_sha} is no longer the tip of main (${tip_sha})."
            exit 0
          fi

          published=false
          if version_is_published "$current_version"; then
            published=true
          fi

          echo "release_ready=true" >> "$GITHUB_OUTPUT"
          echo "crate_name=$crate_name" >> "$GITHUB_OUTPUT"
          echo "version=$current_version" >> "$GITHUB_OUTPUT"
          echo "tag=v${current_version}" >> "$GITHUB_OUTPUT"
          echo "next_version=$next_version" >> "$GITHUB_OUTPUT"
          echo "published=$published" >> "$GITHUB_OUTPUT"

      - name: Create and push release tag
        if: steps.prepare.outputs.release_ready == 'true'
        env:
          RELEASE_TAG: ${{ steps.prepare.outputs.tag }}
        run: |
          set -euo pipefail

          if git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" >/dev/null; then
            tag_sha="$(git rev-parse "${RELEASE_TAG}^{}")"
            head_sha="$(git rev-parse HEAD)"
            if [ "$tag_sha" != "$head_sha" ]; then
              echo "tag ${RELEASE_TAG} already points at ${tag_sha}, not ${head_sha}" >&2
              exit 1
            fi
          else
            git tag -a "$RELEASE_TAG" -m "$RELEASE_TAG"
            git push origin "refs/tags/${RELEASE_TAG}"
          fi

      - name: Publish crate
        if: steps.prepare.outputs.release_ready == 'true' && steps.prepare.outputs.published != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked --token "$CARGO_REGISTRY_TOKEN"

      - name: Create GitHub release
        if: steps.prepare.outputs.release_ready == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.prepare.outputs.tag }}
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "GitHub release ${RELEASE_TAG} already exists."
          else
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --generate-notes
          fi

      - name: Bump Cargo.toml to next patch version
        if: steps.prepare.outputs.release_ready == 'true'
        env:
          CURRENT_VERSION: ${{ steps.prepare.outputs.version }}
          NEXT_VERSION: ${{ steps.prepare.outputs.next_version }}
        run: |
          set -euo pipefail

          perl -0pi -e 's/^version = "\Q$ENV{CURRENT_VERSION}\E"$/version = "$ENV{NEXT_VERSION}"/m' Cargo.toml
          perl -0pi -e 's/name = "uniffi-bindgen-node-js"\nversion = "\Q$ENV{CURRENT_VERSION}\E"/name = "uniffi-bindgen-node-js"\nversion = "$ENV{NEXT_VERSION}"/' Cargo.lock
          cargo metadata --format-version 1 --no-deps >/dev/null

          git add Cargo.toml Cargo.lock
          git commit -m "chore(release): prepare v${NEXT_VERSION}"
          git push origin HEAD:main
