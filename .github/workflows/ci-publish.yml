name: CI and Publish

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          # The callback benchmarks currently abort on Node >22 in koffi.
          node-version: 22

      - name: Install TypeScript CLI
        run: npm install --global typescript@5

      - name: Prefetch crate dependencies
        run: |
          cargo fetch --locked
          cargo fetch --manifest-path fixtures/basic-fixture/Cargo.toml
          cargo fetch --manifest-path fixtures/callback-fixture/Cargo.toml

      - name: Run default test suite
        run: cargo test --locked

      - name: Run ignored runtime and benchmark tests
        run: cargo test --locked -- --ignored

  generated-package-smoke:
    name: Generated Package Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          # The callback benchmarks currently abort on Node >22 in koffi.
          node-version: 22

      - name: Prefetch crate dependencies
        run: |
          cargo fetch --locked
          cargo fetch --manifest-path fixtures/basic-fixture/Cargo.toml
          cargo fetch --manifest-path fixtures/callback-fixture/Cargo.toml

      - name: Run generated-package smoke coverage
        run: |
          cargo test --locked --test node_smoke_tests runs_plain_js_smoke_script_against_generated_basic_fixture_package -- --exact
          cargo test --locked --test node_smoke_tests runs_plain_js_smoke_script_against_generated_callback_fixture_package -- --exact
          cargo test --locked --test node_smoke_tests runs_plain_js_smoke_script_against_generated_bundled_basic_fixture_package -- --exact
          cargo test --locked --test node_smoke_tests manual_load_explicit_path_overrides_missing_bundled_prebuild_and_is_idempotent -- --exact
          cargo test --locked --test node_smoke_tests bundled_mode_import_reports_missing_host_prebuild -- --exact

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
      - generated-package-smoke
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify tag matches crate version
        run: |
          crate_version="$(cargo pkgid | sed 's/.*#//')"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$crate_version" != "$tag_version" ]; then
            echo "tag version $tag_version does not match crate version $crate_version" >&2
            exit 1
          fi

      - name: Publish crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked --token "$CARGO_REGISTRY_TOKEN"
